name: 🏓 Supabase Keep-Alive

# Roda a cada 3 dias às 10:00 UTC para evitar que o Supabase pause
# (projetos free pausam após 7 dias sem atividade)
on:
  schedule:
    - cron: '0 10 */3 * *'   # a cada 3 dias
  workflow_dispatch:           # Permite rodar manualmente pelo GitHub

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🏓 Consulta keep-alive na gallery_photos
        env:
          # Chave PUBLISHABLE (publica — ja vai no client index.html, sem segredo).
          # Hardcoded de proposito: a Repository Variable antiga usava a chave anon
          # legada (JWT), que o Supabase desativou, e isso quebrava o keep-alive.
          SUPABASE_ANON_KEY: 'sb_publishable_1qi0aW8SsJh_omDi2KtpAA_la5uITiT'
        run: |
          echo "⏰  $(date -u '+%Y-%m-%d %H:%M UTC')"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "https://cfirjoyjkazfryvzmjvy.supabase.co/rest/v1/gallery_photos?select=id&limit=1")

          echo "📡  HTTP Status: ${STATUS}"

          if [ "${STATUS}" = "200" ]; then
            echo "✅  Supabase está ativo! Cronômetro de 7 dias resetado."
          else
            echo "⚠️  Status inesperado (${STATUS}). Verifique a chave publishable / o projeto Supabase."
            exit 1
          fi
