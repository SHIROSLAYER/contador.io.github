<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>📷 Migrar Fotos → Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0a040c;color:#f0e8e4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .box{background:#140a10;border:1px solid rgba(200,130,150,.2);border-radius:8px;padding:2rem;width:min(100%,540px)}
    h1{font-size:1.1rem;letter-spacing:.08em;color:#d48898;margin-bottom:1.5rem}
    label{display:block;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.35rem;margin-top:.9rem}
    input,select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f0e8e4;padding:.65rem .9rem;border-radius:4px;font-size:.85rem;outline:none;font-family:inherit}
    input:focus,select:focus{border-color:#d48898}
    button{width:100%;margin-top:1rem;padding:.8rem;background:linear-gradient(90deg,#6e1030,#d48898);border:none;color:#fff;font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;border-radius:4px;cursor:pointer;font-family:inherit;transition:opacity .2s}
    button:hover{opacity:.88}
    button:disabled{opacity:.35;cursor:not-allowed}
    .log{margin-top:1.5rem;background:rgba(0,0,0,.4);border-radius:4px;padding:1rem;font-size:.78rem;font-family:monospace;max-height:320px;overflow-y:auto;line-height:1.7;border:1px solid rgba(255,255,255,.06)}
    .ok{color:#88e8aa}.err{color:#ff8080}.info{color:#d4c080}.muted{color:rgba(255,255,255,.35)}
    .progress{margin-top:.5rem;background:rgba(255,255,255,.08);border-radius:4px;height:6px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,#6e1030,#d48898);transition:width .3s;width:0%}
    .file-count{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:.3rem}
    hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:1.2rem 0}
  </style>
</head>
<body>
<div class="box">
  <h1>📷  Migrar Fotos → Supabase</h1>

  <label>Email admin</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">

  <label>Senha</label>
  <input type="password" id="pass" placeholder="Senha" autocomplete="current-password">

  <hr>

  <label>Destino (seção do site)</label>
  <select id="page">
    <option value="namoro">💑  Namoro — Galeria de fotos</option>
    <option value="noivado">💍  Noivado — Imagem de fundo</option>
    <option value="casamento">💒  Casamento — Galeria</option>
    <option value="seletor">🎠  Seletor — Fotos dos cards</option>
  </select>

  <label>Selecionar fotos</label>
  <input type="file" id="files" accept="image/*" multiple>
  <div class="file-count" id="file-count">Nenhum arquivo selecionado</div>

  <button id="btn" onclick="runUpload()">🚀  Iniciar migração</button>
  <div class="progress"><div class="progress-bar" id="pbar"></div></div>

  <div class="log" id="log"><span class="muted">Aguardando…</span></div>
</div>

<script>
const SB_URL = 'https://cfirjoyjkazfryvzmjvy.supabase.co';
const SB_KEY = 'sb_publishable_1qi0aW8SsJh_omDi2KtpAA_la5uITiT';
const sb     = supabase.createClient(SB_URL, SB_KEY);

document.getElementById('files').addEventListener('change', function() {
  const n = this.files.length;
  document.getElementById('file-count').textContent =
    n ? `${n} arquivo${n > 1 ? 's' : ''} selecionado${n > 1 ? 's' : ''}` : 'Nenhum arquivo selecionado';
});

function log(msg, cls) {
  const el  = document.getElementById('log');
  const div = document.createElement('div');
  div.className = cls || '';
  div.innerHTML = msg;
  el.appendChild(div);
  el.scrollTop  = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('pbar').style.width = pct + '%';
}

async function runUpload() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const page  = document.getElementById('page').value;
  const files = document.getElementById('files').files;
  const btn   = document.getElementById('btn');

  document.getElementById('log').innerHTML = '';

  if (!email || !pass) { log('❌  Preencha email e senha.', 'err'); return; }
  if (!files.length)   { log('❌  Selecione pelo menos uma foto.', 'err'); return; }

  btn.disabled = true;
  setProgress(0);

  // Login
  log('🔐  Autenticando…', 'info');
  const { data: auth, error: authErr } = await sb.auth.signInWithPassword({ email, password: pass });
  if (authErr) { log('❌  ' + authErr.message, 'err'); btn.disabled = false; return; }
  log('✅  Logado como <b>' + auth.user.email + '</b>', 'ok');
  log('📁  ' + files.length + ' foto(s) selecionada(s) → seção <b>' + page + '</b>', 'info');

  let ok = 0, fail = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
    const name = page + '_' + String(i + 1).padStart(3,'0') + '_' + file.name.replace(/\s+/g,'_');

    log(`  [${i+1}/${files.length}] ${file.name} …`, 'muted');

    // Upload Storage
    const { error: upErr } = await sb.storage
      .from('gallery')
      .upload(name, file, { cacheControl:'3600', upsert: false });

    if (upErr && upErr.statusCode !== '409' && !upErr.message?.includes('already exists')) {
      log('  ❌  Storage: ' + upErr.message, 'err');
      fail++;
      setProgress(Math.round((i + 1) / files.length * 100));
      continue;
    }

    const { data: urlData } = sb.storage.from('gallery').getPublicUrl(name);

    const { error: dbErr } = await sb.from('gallery_photos').insert({
      url:           urlData.publicUrl,
      storage_path:  name,
      display_order: i,
      page:          page,
      uploaded_by:   auth.user.id
    });

    if (dbErr) {
      log('  ⚠️  DB: ' + dbErr.message, 'err');
      fail++;
    } else {
      // Atualiza última linha para OK
      const last = document.getElementById('log').lastChild;
      if (last) last.innerHTML = last.innerHTML.replace('…', '✅');
      last.className = 'ok';
      ok++;
    }

    setProgress(Math.round((i + 1) / files.length * 100));
    await new Promise(r => setTimeout(r, 120));
  }

  log('', '');
  log('═══════════════════════════════', 'muted');
  log(`📊  Concluído: <b>${ok} ok</b> · ${fail} falhas`, ok > 0 ? 'ok' : 'err');
  log('═══════════════════════════════', 'muted');
  log('💡  Recarregue o site para ver as fotos na galeria.', 'info');

  await sb.auth.signOut();
  btn.disabled = false;
}
</script>
</body>
</html>
